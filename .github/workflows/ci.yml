name: CI

on:
  push:
    branches: [master, main, "**"]
  pull_request:
    branches: [master, main]

jobs:
  api-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run API tests
        env:
          PYTHONPATH: ${{ github.workspace }}/repo:${{ github.workspace }}/repo/api
        run: |
          pytest repo/tests/ -v --ignore=repo/tests/test_akshare_macro_integration.py --ignore=repo/tests/test_akshare_reference_client.py || true

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repo/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: repo/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build
        env:
          API_PROXY_TARGET: http://127.0.0.1:8000
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./repo/api/Dockerfile
          push: false
          tags: quantpulse-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./repo/web/Dockerfile
          push: false
          tags: quantpulse-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
