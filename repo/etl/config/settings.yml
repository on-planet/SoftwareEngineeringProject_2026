postgres:
  url: "postgresql+psycopg2://postgres:123456@localhost:5432/quantpulse"
  pool_size: 10  # 连接池大小，建议设置为 parallel_workers + 2 以上
  max_overflow: 5  # 最大溢出连接数，建议设置为 parallel_workers 以上
redis:
  url: "redis://localhost:6379/0"
market:
  timezone: "Asia/Shanghai"
  t1_offset_days: 1
etl:
  incremental_lookback_days: 7
  retention_days: 7
  news_event_retention_days: 30
  parallel_workers: 4  # 并行工作线程数，注意：pool_size 应该 >= parallel_workers + 2
  schedules:
    index_job: "00:30"
    financial_job: "01:00"
    news_job: "01:30"
    macro_job: "02:00"
    events_job: "02:30"
    index_constituent_job: "03:00"
    sector_exposure_job: "03:30"
    fund_holdings_job: "04:00"
    futures_job: "04:30"
